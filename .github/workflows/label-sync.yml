name: Label sync

on:
  schedule:
    - cron: "0 0 * * SUN"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"

jobs:
  label-sync:
    name: Label sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v6

      - name: Label sync
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

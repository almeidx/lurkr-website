name: Label sync
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
permissions:
  contents: write
  issues: write
jobs:
  label-sync:
    name: Label sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Label sync
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
